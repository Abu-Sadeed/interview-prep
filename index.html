<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Senior Engineer Interview Prep</title>
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap"
			rel="stylesheet" />
		<script src="data-part1.js"></script>
		<script src="data-part2.js"></script>
		<script src="data-part3.js"></script>
		<script src="data-part4.js"></script>
		<style>
			:root {
				--bg: #090c10;
				--bg2: #0f1318;
				--bg3: #151a22;
				--bg4: #1b2230;
				--bg5: #222b3a;
				--border: #1e2736;
				--border2: #2a3650;
				--border3: #3a4d6a;
				--text: #dde4f0;
				--text2: #8a97b0;
				--text3: #4a5872;
				--blue: #4d9eff;
				--blue-bg: rgba(77, 158, 255, 0.09);
				--green: #34d68a;
				--green-bg: rgba(52, 214, 138, 0.09);
				--amber: #f5a623;
				--amber-bg: rgba(245, 166, 35, 0.09);
				--red: #f04438;
				--red-bg: rgba(240, 68, 56, 0.09);
				--purple: #a78bfa;
				--purple-bg: rgba(167, 139, 250, 0.09);
				--teal: #2dd4bf;
				--teal-bg: rgba(45, 212, 191, 0.09);
				--mono: 'JetBrains Mono', monospace;
				--sans: 'Inter', sans-serif;
				--r: 6px;
			}
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html {
				scroll-behavior: smooth;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: var(--sans);
				font-size: 14px;
				line-height: 1.65;
				min-height: 100vh;
			}
			::-webkit-scrollbar {
				width: 5px;
				height: 5px;
			}
			::-webkit-scrollbar-track {
				background: var(--bg2);
			}
			::-webkit-scrollbar-thumb {
				background: var(--border3);
				border-radius: 3px;
			}

			/* ── HEADER ── */
			.hdr {
				background: var(--bg2);
				border-bottom: 1px solid var(--border);
				padding: 0 1.5rem;
				position: sticky;
				top: 0;
				z-index: 100;
				display: flex;
				align-items: center;
				justify-content: space-between;
				height: 52px;
				gap: 16px;
			}
			.hdr-logo {
				font-family: var(--mono);
				font-size: 12px;
				font-weight: 600;
				color: var(--blue);
				white-space: nowrap;
				letter-spacing: 0.04em;
			}
			.hdr-logo em {
				color: var(--text3);
				font-style: normal;
			}
			.hdr-bar {
				flex: 1;
				max-width: 360px;
			}
			.hdr-prog {
				height: 3px;
				background: var(--border);
				border-radius: 2px;
				overflow: hidden;
			}
			.hdr-fill {
				height: 100%;
				background: linear-gradient(90deg, var(--blue), var(--green));
				border-radius: 2px;
				transition: width 0.4s ease;
			}
			.hdr-stat {
				font-family: var(--mono);
				font-size: 11px;
				color: var(--text3);
				white-space: nowrap;
			}
			.hdr-stat b {
				color: var(--blue);
			}

			/* ── LAYOUT ── */
			.app {
				display: grid;
				grid-template-columns: 272px 1fr;
				min-height: calc(100vh - 52px);
			}

			/* ── SIDEBAR ── */
			.sidebar {
				background: var(--bg2);
				border-right: 1px solid var(--border);
				position: sticky;
				top: 52px;
				height: calc(100vh - 52px);
				overflow-y: auto;
				display: flex;
				flex-direction: column;
			}
			.sb-search {
				padding: 10px 12px;
				border-bottom: 1px solid var(--border);
			}
			.sb-search input {
				width: 100%;
				background: var(--bg3);
				border: 1px solid var(--border2);
				border-radius: var(--r);
				padding: 7px 10px;
				font-family: var(--mono);
				font-size: 11px;
				color: var(--text);
				outline: none;
				transition: border-color 0.15s;
			}
			.sb-search input:focus {
				border-color: var(--blue);
			}
			.sb-search input::placeholder {
				color: var(--text3);
			}
			.sb-filters {
				display: flex;
				gap: 5px;
				padding: 8px 12px;
				border-bottom: 1px solid var(--border);
				flex-wrap: wrap;
			}
			.sf-btn {
				font-family: var(--mono);
				font-size: 10px;
				padding: 3px 9px;
				border-radius: 3px;
				border: 1px solid var(--border2);
				background: transparent;
				color: var(--text3);
				cursor: pointer;
				transition: all 0.12s;
				white-space: nowrap;
			}
			.sf-btn:hover {
				color: var(--text2);
				border-color: var(--border3);
			}
			.sf-btn.active-all {
				background: var(--blue-bg);
				color: var(--blue);
				border-color: rgba(77, 158, 255, 0.3);
			}
			.sf-btn.active-high {
				background: var(--red-bg);
				color: var(--red);
				border-color: rgba(240, 68, 56, 0.3);
			}
			.sf-btn.active-med {
				background: var(--amber-bg);
				color: var(--amber);
				border-color: rgba(245, 166, 35, 0.3);
			}
			.sf-btn.active-low {
				background: var(--bg4);
				color: var(--text2);
				border-color: var(--border3);
			}
			.sb-filter-count {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
				padding: 6px 12px 2px;
			}
			.sb-phases {
				flex: 1;
				overflow-y: auto;
				padding: 6px 0 16px;
			}
			.sb-phase-lbl {
				font-family: var(--mono);
				font-size: 9px;
				font-weight: 600;
				color: var(--text3);
				letter-spacing: 0.12em;
				text-transform: uppercase;
				padding: 10px 14px 4px;
			}
			.sb-item {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 6px 14px;
				cursor: pointer;
				border-left: 2px solid transparent;
				transition: all 0.12s;
			}
			.sb-item:hover {
				background: var(--bg3);
			}
			.sb-item.active {
				background: var(--bg3);
				border-left-color: var(--blue);
			}
			.sb-item.done {
				border-left-color: var(--green);
			}
			.sb-item.hidden {
				display: none;
			}
			.si-num {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
				min-width: 22px;
			}
			.si-name {
				font-size: 12px;
				color: var(--text2);
				flex: 1;
				line-height: 1.3;
			}
			.sb-item.active .si-name {
				color: var(--text);
			}
			.si-dot {
				width: 5px;
				height: 5px;
				border-radius: 50%;
				background: var(--border3);
				flex-shrink: 0;
			}
			.sb-item.done .si-dot {
				background: var(--green);
			}
			.sb-item.active .si-dot {
				background: var(--blue);
			}
			.si-freq {
				font-family: var(--mono);
				font-size: 9px;
				padding: 1px 5px;
				border-radius: 2px;
				flex-shrink: 0;
			}
			.freq-high {
				background: var(--red-bg);
				color: var(--red);
			}
			.freq-med {
				background: var(--amber-bg);
				color: var(--amber);
			}
			.freq-low {
				background: var(--bg4);
				color: var(--text3);
			}

			/* ── MAIN ── */
			.main {
				padding: 2rem 2.5rem 5rem;
				max-width: 900px;
			}

			/* ── BLOCK HEADER ── */
			.blk-meta {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 10px;
				flex-wrap: wrap;
			}
			.phase-chip {
				font-family: var(--mono);
				font-size: 10px;
				font-weight: 600;
				padding: 3px 9px;
				border-radius: 3px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			.chip-java {
				background: var(--blue-bg);
				color: var(--blue);
				border: 1px solid rgba(77, 158, 255, 0.2);
			}
			.chip-spring {
				background: var(--green-bg);
				color: var(--green);
				border: 1px solid rgba(52, 214, 138, 0.2);
			}
			.chip-db {
				background: var(--amber-bg);
				color: var(--amber);
				border: 1px solid rgba(245, 166, 35, 0.2);
			}
			.chip-messaging {
				background: var(--red-bg);
				color: var(--red);
				border: 1px solid rgba(240, 68, 56, 0.2);
			}
			.chip-api {
				background: var(--purple-bg);
				color: var(--purple);
				border: 1px solid rgba(167, 139, 250, 0.2);
			}
			.chip-infra {
				background: var(--teal-bg);
				color: var(--teal);
				border: 1px solid rgba(45, 212, 191, 0.2);
			}
			.chip-frontend {
				background: var(--amber-bg);
				color: var(--amber);
				border: 1px solid rgba(245, 166, 35, 0.2);
			}
			.chip-arch {
				background: var(--purple-bg);
				color: var(--purple);
				border: 1px solid rgba(167, 139, 250, 0.2);
			}
			.blk-num {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
			}
			.freq-chip {
				font-family: var(--mono);
				font-size: 10px;
				padding: 3px 8px;
				border-radius: 3px;
			}
			.blk-title {
				font-size: 26px;
				font-weight: 700;
				color: var(--text);
				line-height: 1.15;
				margin-bottom: 6px;
			}
			.blk-sub {
				font-size: 14px;
				color: var(--text2);
				margin-bottom: 14px;
			}
			.prereq-row {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-bottom: 16px;
				flex-wrap: wrap;
			}
			.prereq-lbl {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
			}
			.prereq-tag {
				font-family: var(--mono);
				font-size: 10px;
				padding: 2px 8px;
				background: var(--bg3);
				border: 1px solid var(--border2);
				border-radius: 3px;
				color: var(--blue);
				cursor: pointer;
				transition: all 0.12s;
			}
			.prereq-tag:hover {
				border-color: var(--blue);
			}

			/* ── TIERS ── */
			.tier {
				border: 1px solid var(--border);
				border-radius: 8px;
				margin-bottom: 12px;
				overflow: hidden;
				background-color: #2dd4bf;
				width: 80%;
			}
			.tier-hdr {
				padding: 11px 16px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				cursor: pointer;
				user-select: none;
			}
			.tier-hdr:hover {
				filter: brightness(1.15);
			}
			.tier-t1 .tier-hdr {
				background: rgba(77, 158, 255, 0.05);
				border-bottom: 1px solid rgba(77, 158, 255, 0.12);
			}
			.tier-t2 .tier-hdr {
				background: rgba(245, 166, 35, 0.05);
				border-bottom: 1px solid rgba(245, 166, 35, 0.12);
			}
			.tier-t3 .tier-hdr {
				background: rgba(240, 68, 56, 0.05);
				border-bottom: 1px solid rgba(240, 68, 56, 0.12);
			}
			.tier:not(.open) .tier-hdr {
				border-bottom: none;
			}
			.tier-left {
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.tier-badge {
				font-family: var(--mono);
				font-size: 10px;
				font-weight: 600;
				padding: 2px 8px;
				border-radius: 3px;
			}
			.tier-t1 .tier-badge {
				background: rgba(77, 158, 255, 0.15);
				color: var(--blue);
			}
			.tier-t2 .tier-badge {
				background: rgba(245, 166, 35, 0.15);
				color: var(--amber);
			}
			.tier-t3 .tier-badge {
				background: rgba(240, 68, 56, 0.15);
				color: var(--red);
			}
			.tier-title {
				font-size: 13px;
				font-weight: 500;
				color: var(--text);
			}
			.tier-right {
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.tier-time {
				font-family: var(--mono);
				font-size: 11px;
				color: var(--text3);
			}
			.tier-chevron {
				color: var(--text3);
				font-size: 14px;
				transition: transform 0.2s;
			}
			.tier.open .tier-chevron {
				transform: rotate(180deg);
			}
			.tier-body {
				display: none;
				padding: 18px;
			}
			.tier.open .tier-body {
				display: block;
			}

			/* ── TOPIC SECTIONS ── */
			.topic-sec {
				margin-bottom: 20px;
			}
			.topic-sec:last-of-type {
				margin-bottom: 0;
			}
			.topic-h {
				font-family: var(--mono);
				font-size: 10px;
				font-weight: 600;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				margin-bottom: 10px;
				padding-bottom: 7px;
				border-bottom: 1px solid var(--border);
			}
			.tier-t1 .topic-h {
				color: var(--blue);
			}
			.tier-t2 .topic-h {
				color: var(--amber);
			}
			.tier-t3 .topic-h {
				color: var(--red);
			}
			.topic-ul {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 7px;
			}
			.topic-ul li {
				display: flex;
				align-items: flex-start;
				gap: 8px;
				font-size: 13px;
				color: var(--text2);
				line-height: 1.55;
			}
			.topic-ul li::before {
				content: '→';
				font-family: var(--mono);
				font-size: 11px;
				color: var(--text3);
				flex-shrink: 0;
				margin-top: 2px;
			}
			.topic-ul li b {
				color: var(--text);
				font-weight: 500;
			}
			.topic-ul li code {
				font-family: var(--mono);
				font-size: 11px;
				background: var(--bg4);
				padding: 1px 5px;
				border-radius: 3px;
				color: var(--teal);
			}

			/* ── TRAPS ── */
			.traps-box {
				margin-top: 16px;
				background: var(--amber-bg);
				border: 1px solid rgba(245, 166, 35, 0.18);
				border-radius: var(--r);
				padding: 12px 14px;
			}
			.traps-title {
				font-family: var(--mono);
				font-size: 10px;
				font-weight: 600;
				color: var(--amber);
				letter-spacing: 0.08em;
				text-transform: uppercase;
				margin-bottom: 8px;
			}
			.traps-ul {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 5px;
			}
			.traps-ul li {
				font-size: 12px;
				color: var(--text2);
				display: flex;
				gap: 7px;
				line-height: 1.5;
			}
			.traps-ul li::before {
				content: '⚠';
				font-size: 11px;
				flex-shrink: 0;
			}

			/* ── CHECKPOINT ── */
			.ckpt-box {
				margin-top: 12px;
				background: var(--green-bg);
				border: 1px solid rgba(52, 214, 138, 0.15);
				border-radius: var(--r);
				padding: 14px;
			}
			.ckpt-title {
				font-family: var(--mono);
				font-size: 10px;
				font-weight: 600;
				color: var(--green);
				letter-spacing: 0.08em;
				text-transform: uppercase;
				margin-bottom: 10px;
			}
			.ckpt-ul {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			.ckpt-ul li {
				font-size: 12px;
				color: var(--text2);
				display: flex;
				gap: 8px;
				align-items: flex-start;
				line-height: 1.5;
			}
			.ckpt-ul li::before {
				content: '?';
				font-family: var(--mono);
				font-size: 11px;
				color: var(--green);
				flex-shrink: 0;
				font-weight: 700;
			}
			.ckpt-note {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
				margin-top: 8px;
				padding-top: 8px;
				border-top: 1px solid rgba(52, 214, 138, 0.1);
			}

			/* ── GRILL SECTION ── */
			.grill-wrap {
				margin-top: 2rem;
				border: 1px solid var(--border2);
				border-radius: 8px;
				overflow: hidden;
			}
			.grill-hdr {
				padding: 12px 16px;
				background: var(--bg3);
				border-bottom: 1px solid var(--border);
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.grill-hdr-left .grill-title {
				font-family: var(--mono);
				font-size: 12px;
				font-weight: 600;
				color: var(--text);
			}
			.grill-hdr-left .grill-sub {
				font-size: 11px;
				color: var(--text3);
				margin-top: 2px;
			}
			.grill-tabs {
				display: flex;
				gap: 4px;
				padding: 12px 16px 0;
			}
			.g-tab {
				font-family: var(--mono);
				font-size: 11px;
				padding: 5px 12px;
				border-radius: 4px 4px 0 0;
				cursor: pointer;
				border: 1px solid var(--border);
				border-bottom: none;
				color: var(--text3);
				background: var(--bg2);
				transition: all 0.12s;
			}
			.g-tab.active {
				background: var(--bg4);
				color: var(--text);
				border-color: var(--border2);
			}
			.g-tab:hover:not(.active) {
				color: var(--text2);
			}
			.grill-prompt {
				margin: 0 16px;
				background: var(--bg4);
				border: 1px solid var(--border2);
				border-radius: 0 6px 6px 6px;
				padding: 16px;
				position: relative;
			}
			.grill-text {
				font-family: var(--mono);
				font-size: 11px;
				color: var(--text2);
				line-height: 1.8;
				white-space: pre-wrap;
			}
			.copy-btn {
				position: absolute;
				top: 10px;
				right: 10px;
				background: var(--bg3);
				border: 1px solid var(--border2);
				color: var(--text2);
				font-family: var(--mono);
				font-size: 10px;
				padding: 4px 10px;
				border-radius: 4px;
				cursor: pointer;
				transition: all 0.15s;
			}
			.copy-btn:hover {
				background: var(--blue);
				color: var(--bg);
				border-color: var(--blue);
			}
			.copy-btn.ok {
				background: rgba(52, 214, 138, 0.15);
				color: var(--green);
				border-color: var(--green);
			}
			.grill-footer {
				padding: 10px 16px;
				border-top: 1px solid var(--border);
			}
			.grill-note {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
				line-height: 1.6;
			}

			/* ── TIER SELECTOR FOR GRILL ── */
			.grill-tier-tabs {
				display: flex;
				gap: 4px;
				padding: 12px 16px 0;
			}
			.gt-tab {
				font-family: var(--mono);
				font-size: 11px;
				padding: 5px 12px;
				border-radius: 4px 4px 0 0;
				cursor: pointer;
				border: 1px solid var(--border);
				border-bottom: none;
				color: var(--text3);
				background: var(--bg2);
				transition: all 0.12s;
			}
			.gt-tab.active {
				background: var(--bg4);
				color: var(--text);
				border-color: var(--border2);
			}

			/* ── DONE BUTTON ── */
			.done-btn {
				width: 100%;
				margin-top: 2rem;
				padding: 13px;
				background: transparent;
				border: 1px solid rgba(52, 214, 138, 0.2);
				color: var(--green);
				font-family: var(--mono);
				font-size: 12px;
				font-weight: 600;
				border-radius: var(--r);
				cursor: pointer;
				letter-spacing: 0.05em;
				transition: all 0.2s;
			}
			.done-btn:hover {
				background: var(--green-bg);
				border-color: var(--green);
			}
			.done-btn.is-done {
				background: var(--green-bg);
				border-color: var(--green);
			}

			/* ── NAV ── */
			.nav-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 2rem;
				padding-top: 1.5rem;
				border-top: 1px solid var(--border);
			}
			.nav-btn {
				font-family: var(--mono);
				font-size: 11px;
				padding: 8px 16px;
				border-radius: var(--r);
				cursor: pointer;
				border: 1px solid var(--border2);
				background: transparent;
				color: var(--text2);
				transition: all 0.15s;
			}
			.nav-btn:hover:not(:disabled) {
				border-color: var(--blue);
				color: var(--blue);
			}
			.nav-btn.pri {
				background: rgba(77, 158, 255, 0.1);
				color: var(--blue);
				border-color: rgba(77, 158, 255, 0.3);
			}
			.nav-btn.pri:hover {
				background: rgba(77, 158, 255, 0.2);
			}
			.nav-btn:disabled {
				opacity: 0.25;
				cursor: not-allowed;
			}
			.nav-mid {
				font-family: var(--mono);
				font-size: 11px;
				color: var(--text3);
			}

			/* ── OVERVIEW ── */
			.ov {
				padding: 2rem 2.5rem 5rem;
			}
			.ov-title {
				font-size: 30px;
				font-weight: 700;
				margin-bottom: 6px;
			}
			.ov-sub {
				color: var(--text2);
				margin-bottom: 2rem;
			}
			.ov-stats {
				display: grid;
				grid-template-columns: repeat(4, 1fr);
				gap: 12px;
				margin-bottom: 2.5rem;
			}
			.ov-stat {
				background: var(--bg2);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 16px;
				text-align: center;
			}
			.ov-num {
				font-family: var(--mono);
				font-size: 26px;
				font-weight: 600;
				color: var(--blue);
			}
			.ov-lbl {
				font-size: 11px;
				color: var(--text3);
				margin-top: 4px;
			}
			.ov-phases {
			}
			.ov-phase-lbl {
				font-family: var(--mono);
				font-size: 10px;
				font-weight: 600;
				color: var(--text3);
				letter-spacing: 0.1em;
				text-transform: uppercase;
				margin-bottom: 10px;
			}
			.ov-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
				gap: 8px;
				margin-bottom: 2rem;
			}
			.ov-card {
				background: var(--bg2);
				border: 1px solid var(--border);
				border-radius: var(--r);
				padding: 10px 12px;
				cursor: pointer;
				transition: all 0.15s;
			}
			.ov-card:hover {
				border-color: var(--border2);
				background: var(--bg3);
			}
			.ov-card.done {
				border-left: 3px solid var(--green);
			}
			.oc-num {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
			}
			.oc-name {
				font-size: 12px;
				font-weight: 500;
				color: var(--text);
				margin: 3px 0;
			}
			.oc-meta {
				font-family: var(--mono);
				font-size: 10px;
				color: var(--text3);
			}
			.oc-freq {
				font-family: var(--mono);
				font-size: 9px;
				padding: 1px 5px;
				border-radius: 2px;
				display: inline-block;
				margin-top: 4px;
			}

			@media (max-width: 768px) {
				.app {
					grid-template-columns: 1fr;
				}
				.sidebar {
					position: relative;
					height: auto;
					top: 0;
				}
				.main,
				.ov {
					padding: 1rem 1rem 4rem;
				}
				.ov-stats {
					grid-template-columns: repeat(2, 1fr);
				}
			}
		</style>
	</head>
	<body>
		<header class="hdr">
			<div class="hdr-logo">senior<em>.</em>prep <em>// v3.0</em></div>
			<div class="hdr-bar">
				<div class="hdr-prog">
					<div class="hdr-fill" id="hdr-fill" style="width: 0%"></div>
				</div>
			</div>
			<div class="hdr-stat" id="hdr-stat">
				<b>0</b> / ${ALL_BLOCKS.length} blocks complete
			</div>
		</header>

		<div class="app">
			<nav class="sidebar">
				<div class="sb-search">
					<input
						type="text"
						id="sb-search"
						placeholder="Search blocks…"
						oninput="filterSidebar()" />
				</div>
				<div class="sb-filters">
					<button
						class="sf-btn active-all"
						id="sf-all"
						onclick="setFreqFilter('all')">
						All
					</button>
					<button
						class="sf-btn"
						id="sf-high"
						onclick="setFreqFilter('high')">
						🔴 High
					</button>
					<button
						class="sf-btn"
						id="sf-med"
						onclick="setFreqFilter('med')">
						🟡 Med
					</button>
					<button
						class="sf-btn"
						id="sf-low"
						onclick="setFreqFilter('low')">
						⚪ Low
					</button>
				</div>
				<div class="sb-filter-count" id="sb-count"></div>
				<div class="sb-phases" id="sb-phases"></div>
			</nav>
			<div id="main-area"></div>
		</div>

		<script>
			// ─── Merge all block data ───────────────────────────────────
			const ALL_BLOCKS = [
				...(globalThis.BLOCKS_PART1 || []),
				...(globalThis.BLOCKS_PART2 || []),
				...(globalThis.BLOCKS_PART3 || []),
				...(globalThis.BLOCKS_PART4 || []),
			].sort((a, b) => a.id - b.id);

			// ─── State ─────────────────────────────────────────────────
			// 0 = overview
			let currentId = 0;
			let done = new Set(
				JSON.parse(localStorage.getItem('prep_done') || '[]'),
			);

			// blockId → tier index 0/1/2
			let grillTier = {};

			function saveDone() {
				localStorage.setItem('prep_done', JSON.stringify([...done]));
			}

			// ─── Helpers ───────────────────────────────────────────────
			function phaseColor(chip) {
				const map = {
					java: 'blue',
					spring: 'green',
					db: 'amber',
					messaging: 'red',
					api: 'purple',
					infra: 'teal',
					frontend: 'amber',
					arch: 'purple',
				};
				return map[chip] || 'blue';
			}

			function freqClass(f) {
				return f === 'high'
					? 'freq-high'
					: f === 'med'
						? 'freq-med'
						: 'freq-low';
			}

			function freqLabel(f) {
				return f === 'high'
					? 'HIGH FREQ'
					: f === 'med'
						? 'MED FREQ'
						: 'LOW FREQ';
			}

			// ─── Sidebar ───────────────────────────────────────────────
			function buildSidebar() {
				const phases = {};
				ALL_BLOCKS.forEach((b) => {
					if (!phases[b.phase]) phases[b.phase] = [];
					phases[b.phase].push(b);
				});

				let html = '';
				for (const [phase, blocks] of Object.entries(phases)) {
					html += `<div class="sb-phase-lbl">${phase}</div>`;
					blocks.forEach((b) => {
						const isDone = done.has(b.id);
						const isActive = currentId === b.id;
						html += `
        <div class="sb-item ${isDone ? 'done' : ''} ${isActive ? 'active' : ''}" id="si-${b.id}" data-freq="${b.freq}" onclick="showBlock(${b.id})">
          <span class="si-num">${String(b.id).padStart(2, '0')}</span>
          <span class="si-name">${b.title.split(' — ')[0]}</span>
          <span class="si-freq ${freqClass(b.freq)}">${b.freq.toUpperCase()}</span>
          <span class="si-dot"></span>
        </div>`;
					});
				}
				document.getElementById('sb-phases').innerHTML = html;
				updateProgress();
			}

			let activeFreq = 'all';

			function setFreqFilter(freq) {
				activeFreq = freq;
				['all', 'high', 'med', 'low'].forEach((f) => {
					const btn = document.getElementById('sf-' + f);
					if (!btn) return;
					btn.className =
						'sf-btn' + (f === freq ? ' active-' + f : '');
				});
				filterSidebar();
			}

			function filterSidebar() {
				const q = (document.getElementById('sb-search')?.value || '')
					.toLowerCase()
					.trim();
				let visible = 0;
				document.querySelectorAll('.sb-item').forEach((el) => {
					const name = el
						.querySelector('.si-name')
						.textContent.toLowerCase();
					const freq = el.dataset.freq || '';
					const matchSearch = q.length === 0 || name.includes(q);
					const matchFreq =
						activeFreq === 'all' || freq === activeFreq;
					const hide = !matchSearch || !matchFreq;
					el.classList.toggle('hidden', hide);
					if (!hide) visible++;
				});
				const countEl = document.getElementById('sb-count');
				if (countEl) {
					countEl.textContent =
						activeFreq === 'all' && q.length === 0
							? ''
							: visible +
								' block' +
								(visible !== 1 ? 's' : '') +
								' shown';
				}
			}

			function updateProgress() {
				const pct = ((done.size / ALL_BLOCKS.length) * 100).toFixed(0);
				document.getElementById('hdr-fill').style.width = pct + '%';
				document.getElementById('hdr-stat').innerHTML =
					`<b>${done.size}</b> / ${ALL_BLOCKS.length} blocks complete`;
			}

			// ─── Overview ──────────────────────────────────────────────
			function showOverview() {
				currentId = 0;
				buildSidebar();

				const phases = {};
				ALL_BLOCKS.forEach((b) => {
					if (!phases[b.phase]) phases[b.phase] = [];
					phases[b.phase].push(b);
				});

				const totalTime = ALL_BLOCKS.reduce((acc, b) => {
					return (
						acc +
						b.tiers.reduce((a2, t) => a2 + parseInt(t.time), 0)
					);
				}, 0);

				let html = `<div class="ov">
    <div class="ov-title">Interview Prep Syllabus</div>
    <div class="ov-sub">${ALL_BLOCKS.length} blocks · 3 tiers each · beginner → senior level 5+</div>
    <div class="ov-stats">
      <div class="ov-stat"><div class="ov-num">${ALL_BLOCKS.length}</div><div class="ov-lbl">Total blocks</div></div>
      <div class="ov-stat"><div class="ov-num">${Object.keys(phases).length}</div><div class="ov-lbl">Study sessions</div></div>
      <div class="ov-stat"><div class="ov-num">${Math.round(totalTime / 60)}h</div><div class="ov-lbl">Est. study time</div></div>
      <div class="ov-stat"><div class="ov-num">${done.size}</div><div class="ov-lbl">Completed</div></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:2rem;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;">Study Strategy — Use the sidebar filter to focus</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        <div style="background:var(--red-bg);border:1px solid rgba(240,68,56,.2);border-radius:6px;padding:12px;">
          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--red);">🔴 ${ALL_BLOCKS.filter((b) => b.freq === 'high').length}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text);margin:4px 0 2px;">High Frequency</div>
          <div style="font-size:11px;color:var(--text2);">Almost certain to be asked. Do these first regardless of tech.</div>
        </div>
        <div style="background:var(--amber-bg);border:1px solid rgba(245,166,35,.2);border-radius:6px;padding:12px;">
          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--amber);">🟡 ${ALL_BLOCKS.filter((b) => b.freq === 'med').length}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text);margin:4px 0 2px;">Medium Frequency</div>
          <div style="font-size:11px;color:var(--text2);">50–60% of interviews. Study after all high-freq blocks are done.</div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:12px;">
          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text2);">⚪ ${ALL_BLOCKS.filter((b) => b.freq === 'low').length}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text);margin:4px 0 2px;">Low Frequency</div>
          <div style="font-size:11px;color:var(--text2);">Niche or role-specific. Study only if interview is for that tech.</div>
        </div>
      </div>
    </div>`;

				for (const [phase, blocks] of Object.entries(phases)) {
					html += `<div class="ov-phases"><div class="ov-phase-lbl">${phase}</div><div class="ov-grid">`;
					blocks.forEach((b) => {
						const isDone = done.has(b.id);
						html += `
        <div class="ov-card ${isDone ? 'done' : ''}" onclick="showBlock(${b.id})">
          <div class="oc-num">Block ${String(b.id).padStart(2, '0')}</div>
          <div class="oc-name">${b.title.split(' — ')[0]}</div>
          <div class="oc-meta">${b.title.split(' — ')[1] || b.subtitle.split(',')[0]}</div>
          <span class="oc-freq ${freqClass(b.freq)}">${freqLabel(b.freq)}</span>
        </div>`;
					});
					html += `</div></div>`;
				}
				html += `</div>`;
				document.getElementById('main-area').innerHTML = html;
			}

			// ─── Block view ────────────────────────────────────────────
			function showBlock(id) {
				const b = ALL_BLOCKS.find((x) => x.id === id);
				if (!b) return;
				currentId = id;
				if (!grillTier[id]) grillTier[id] = 0;
				buildSidebar();

				const idx = ALL_BLOCKS.findIndex((x) => x.id === id);
				const prev = idx > 0 ? ALL_BLOCKS[idx - 1].id : null;
				const next =
					idx < ALL_BLOCKS.length - 1 ? ALL_BLOCKS[idx + 1].id : null;
				const isDone = done.has(id);

				// prereqs
				let prereqHtml = '';
				if (b.prereqs && b.prereqs.length) {
					prereqHtml = `<div class="prereq-row"><span class="prereq-lbl">PREREQS:</span>`;
					b.prereqs.forEach((pid) => {
						const pb = ALL_BLOCKS.find((x) => x.id === pid);
						if (pb)
							prereqHtml += `<span class="prereq-tag" onclick="showBlock(${pid})">Block ${pid}: ${pb.title.split(' — ')[0]}</span>`;
					});
					prereqHtml += `</div>`;
				}

				// tiers
				let tiersHtml = '';
				b.tiers.forEach((tier, ti) => {
					const tierClass = `tier-t${ti + 1}`;
					const tierLabels = [
						'Tier 1 — Beginner',
						'Tier 2 — Intermediate',
						'Tier 3 — Advanced',
					];
					const savedKey = `tier_${id}_${ti}`;
					const isOpen =
						sessionStorage.getItem(savedKey) !== 'closed';

					let sectionsHtml = '';
					tier.sections.forEach((sec) => {
						sectionsHtml += `<div class="topic-sec"><div class="topic-h">${sec.heading}</div><ul class="topic-ul">`;
						sec.items.forEach((item) => {
							sectionsHtml += `<li>${item}</li>`;
						});
						sectionsHtml += `</ul></div>`;
					});

					let trapsHtml = '';
					if (tier.traps && tier.traps.length) {
						trapsHtml = `<div class="traps-box"><div class="traps-title">⚠ Common Interview Traps</div><ul class="traps-ul">`;
						tier.traps.forEach((t) => {
							trapsHtml += `<li>${t}</li>`;
						});
						trapsHtml += `</ul></div>`;
					}

					let ckptHtml = '';
					if (tier.checkpoint && tier.checkpoint.length) {
						ckptHtml = `<div class="ckpt-box"><div class="ckpt-title">✓ Self-Check Before Advancing</div><ul class="ckpt-ul">`;
						tier.checkpoint.forEach((q) => {
							ckptHtml += `<li>${q}</li>`;
						});
						ckptHtml += `</ul><div class="ckpt-note">If you can answer all three confidently without notes → advance to next tier.</div></div>`;
					}

					tiersHtml += `
      <div class="tier ${tierClass} ${isOpen ? 'open' : ''}" id="tier_${id}_${ti}">
        <div class="tier-hdr" onclick="toggleTier('tier_${id}_${ti}')">
          <div class="tier-left">
            <span class="tier-badge">${tierLabels[ti]}</span>
          </div>
          <div class="tier-right">
            <span class="tier-time">${tier.time}</span>
            <span class="tier-chevron">▾</span>
          </div>
        </div>
        <div class="tier-body">
          ${sectionsHtml}
          ${trapsHtml}
          ${ckptHtml}
        </div>
      </div>`;
				});

				// grill section - single universal prompt with tier context
				const grillTierNames = ['Beginner', 'Intermediate', 'Advanced'];
				const grillTierColors = [
					'var(--blue)',
					'var(--amber)',
					'var(--red)',
				];
				let grillTabsHtml = '';
				grillTierNames.forEach((name, ti) => {
					grillTabsHtml += `<div class="gt-tab ${grillTier[id] === ti ? 'active' : ''}" onclick="setGrillTier(${id},${ti})">${ti + 1}. ${name}</div>`;
				});

				const grillPromptText = buildGrillPrompt(b, grillTier[id]);

				const grillHtml = `
    <div class="grill-wrap">
      <div class="grill-hdr">
        <div class="grill-hdr-left">
          <div class="grill-title">Grill Prompt</div>
          <div class="grill-sub">Copy → paste into any LLM → get grilled on this block</div>
        </div>
      </div>
      <div class="grill-tier-tabs">${grillTabsHtml}</div>
      <div class="grill-prompt" id="grill-prompt-${id}">
        <pre class="grill-text" id="grill-text-${id}">${escHtml(grillPromptText)}</pre>
        <button class="copy-btn" id="copy-btn-${id}" onclick="copyGrill(${id})">Copy</button>
      </div>
      <div class="grill-footer">
        <div class="grill-note">After studying all three tiers, come back and say "Block ${id} — done, grill me" in a new chat, or paste the prompt above into any LLM. Pass = mark complete. Fail = repeat that tier.</div>
      </div>
    </div>`;

				const html = `
    <div class="main">
      <div class="blk-meta">
        <span class="phase-chip chip-${b.chip}">${b.phase}</span>
        <span class="blk-num">Block ${String(b.id).padStart(2, '0')}</span>
        <span class="freq-chip ${freqClass(b.freq)}">${freqLabel(b.freq)}</span>
      </div>
      <div class="blk-title">${b.title}</div>
      <div class="blk-sub">${b.subtitle}</div>
      ${prereqHtml}
      ${tiersHtml}
      ${grillHtml}
      <button class="done-btn ${isDone ? 'is-done' : ''}" id="done-btn-${id}" onclick="toggleDone(${id})">
        ${isDone ? '✓ Marked as complete — click to undo' : 'Mark block as complete'}
      </button>
      <div class="nav-row">
        <button class="nav-btn" onclick="${prev ? `showBlock(${prev})` : 'showOverview()'}" >← ${prev ? `Block ${prev}` : 'Overview'}</button>
        <span class="nav-mid">${idx + 1} / ${ALL_BLOCKS.length}</span>
        <button class="nav-btn pri" onclick="${next ? `showBlock(${next})` : 'showOverview()'}" ${!next ? 'disabled' : ''}>
          ${next ? `Block ${next} →` : 'Done!'}
        </button>
      </div>
    </div>`;

				document.getElementById('main-area').innerHTML = html;
				window.scrollTo(0, 0);
			}

			// ─── Grill prompt builder ───────────────────────────────────
			function buildGrillPrompt(b, tierIdx) {
				const tierNames = ['Beginner', 'Intermediate', 'Advanced'];
				const tierName = tierNames[tierIdx] || 'Beginner';
				const tier = b.tiers[tierIdx];
				if (!tier) return b.grill || '';

				// Build topic summary for this tier
				const topicSummary = tier.sections
					.map(
						(s) =>
							`${s.heading}: ${s.items
								.slice(0, 2)
								.map((i) => i.replace(/<[^>]+>/g, ''))
								.join('; ')}`,
					)
					.join('\n');

				const traps = tier.traps
					? tier.traps.map((t) => `- ${t}`).join('\n')
					: '';

				return `You are a Senior Engineer conducting a technical interview.

BLOCK: ${b.id} — ${b.title}
TIER: ${tierName}
CANDIDATE PROFILE: ~5 years experience, targeting Senior Backend Engineer roles at international companies.

TOPICS COVERED IN THIS TIER:
${topicSummary}

KNOWN TRAPS FOR THIS TIER:
${traps}

YOUR ROLE: Reactive, unpredictable Socratic interviewer.

RULES:
1. Ask ONE question at a time. Never list multiple questions.
2. Wait for the candidate's full answer before proceeding.
3. React to their answer — if shallow, dig deeper. If wrong, ask them to reason through it (don't just correct). If correct, find the edge case or production implication.
4. Do NOT follow a fixed script. Cover the topic areas above from multiple angles.
5. Mix question types: conceptual ("explain how X works"), scenario ("your system is doing Y, diagnose it"), design ("how would you implement Z"), and trap questions.
6. After 6–8 exchanges, give a verdict:
   - PASS: ready to advance to next tier
   - BORDERLINE: review specific area X and retry
   - FAIL: go back and study, specific weak areas: [list them]
7. Name exactly what was weak and what was strong in your verdict.

BEGIN: Ask your first question now. No preamble, no introduction.`;
			}

			// ─── Tier grill selector ────────────────────────────────────
			function setGrillTier(blockId, tierIdx) {
				grillTier[blockId] = tierIdx;
				const b = ALL_BLOCKS.find((x) => x.id === blockId);
				if (!b) return;

				// update tabs
				document
					.querySelectorAll(`#main-area .gt-tab`)
					.forEach((el, i) => {
						el.classList.toggle('active', i === tierIdx);
					});

				// update prompt text
				const promptEl = document.getElementById(
					`grill-text-${blockId}`,
				);
				if (promptEl) {
					promptEl.textContent = buildGrillPrompt(b, tierIdx);
				}
			}

			// ─── Toggle tier open/closed ────────────────────────────────
			function toggleTier(key) {
				const el = document.getElementById(key);
				if (!el) return;
				const isOpen = el.classList.toggle('open');
				sessionStorage.setItem(key, isOpen ? 'open' : 'closed');
			}

			// ─── Copy grill prompt ──────────────────────────────────────
			function copyGrill(blockId) {
				const textEl = document.getElementById(`grill-text-${blockId}`);
				if (!textEl) return;
				navigator.clipboard
					.writeText(textEl.textContent)
					.then(() => {
						const btn = document.getElementById(
							`copy-btn-${blockId}`,
						);
						if (btn) {
							btn.textContent = 'Copied!';
							btn.classList.add('ok');
							setTimeout(() => {
								btn.textContent = 'Copy';
								btn.classList.remove('ok');
							}, 2000);
						}
					})
					.catch(() => {
						// fallback
						const ta = document.createElement('textarea');
						ta.value = textEl.textContent;
						document.body.appendChild(ta);
						ta.select();
						document.execCommand('copy');
						document.body.removeChild(ta);
					});
			}

			// ─── Toggle done ────────────────────────────────────────────
			function toggleDone(blockId) {
				if (done.has(blockId)) {
					done.delete(blockId);
				} else {
					done.add(blockId);
				}
				saveDone();
				buildSidebar();

				const btn = document.getElementById(`done-btn-${blockId}`);
				if (btn) {
					const isDone = done.has(blockId);
					btn.textContent = isDone
						? '✓ Marked as complete — click to undo'
						: 'Mark block as complete';
					btn.classList.toggle('is-done', isDone);
				}
			}

			// ─── HTML escape ────────────────────────────────────────────
			function escHtml(str) {
				return str
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;');
			}

			// ─── Init ───────────────────────────────────────────────────
			if (ALL_BLOCKS.length === 0) {
				document.getElementById('main-area').innerHTML = `
    <div style="padding:3rem;color:var(--red);font-family:var(--mono);">
      ⚠ Data files not loaded. Make sure data-part1.js, data-part2.js, and data-part3.js are in the same folder as index.html.
    </div>`;
			} else {
				showOverview();
			}
		</script>
	</body>
</html>
